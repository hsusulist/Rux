<script>
const TOKEN_KEY='rux_token';
const MODEL_LABELS={'gemini-flash':'Gemini Flash','gemini-pro':'Gemini Pro','sonnet':'Claude Sonnet','opus':'Claude Opus'};
const MODE_LABELS={'chat':'Chat','agent':'Agent'};
let token=null,userData=null,credits={balance:50.00,max:50.00,next_credit_at:0};
let sessionId=null,mode='chat',activeConvId=null,pendingSessionId=null;
let isLoading=false,conversationHistory=[],currentMessages=[],selectedModel='sonnet';
let pluginConnected=false,statusPoll=null,connectPoll=null,heartbeatInterval=null,lastShownToolId=null;
let openPicker=null,inConversation=false,convCache={};

function getToken(){return localStorage.getItem(TOKEN_KEY)}
function setToken(t){token=t;localStorage.setItem(TOKEN_KEY,t)}

async function api(path,opts={}){
  const headers=opts.headers||{};
  if(token)headers['Authorization']='Bearer '+token;
  const res=await fetch(path,{...opts,headers});
  const data=await res.json();
  if(res.status===401){doLogout();return null}
  return{ok:res.ok,status:res.status,data};
}

function doLogout(){
  localStorage.removeItem(TOKEN_KEY);token=null;userData=null;
  if(statusPoll)clearInterval(statusPoll);
  if(connectPoll)clearInterval(connectPoll);
  if(heartbeatInterval)clearInterval(heartbeatInterval);
  window.location.href='/';
}
document.getElementById('logout-btn').addEventListener('click',doLogout);

async function enterApp(){
  const r=await api('/auth/me');
  if(!r)return;
  credits=r.data.credits;sessionId=r.data.session_id;
  updateCreditUI();
  if(sessionId)pluginConnected=true;
  updatePluginUI();enterChat();loadConversations();startWebHeartbeat();
}

/* ═══ WEB HEARTBEAT ═══ */
function sendHeartbeat(){
  return api('/web/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})}).then(r=>{
    if(!r)return;
    if(r.data.plugin_connected&&!pluginConnected){
      pluginConnected=true;updatePluginUI();updateInputState();
    }else if(!r.data.plugin_connected&&pluginConnected){
      pluginConnected=false;updatePluginUI();updateInputState();
    }
    if(r.data.credits!=null){credits.balance=r.data.credits;updateCreditUI();updateInputState();}
    if(r.data.session_id)sessionId=r.data.session_id;
  }).catch(()=>{});
}

function startWebHeartbeat(){
  if(heartbeatInterval)clearInterval(heartbeatInterval);
  sendHeartbeat();
  heartbeatInterval=setInterval(sendHeartbeat,10000);
}

/* Send heartbeat immediately when tab becomes visible again */
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible')sendHeartbeat();
});

/* ═══ DISCONNECT PLUGIN ═══ */
async function disconnectPlugin(){
  try{await api('/web/disconnect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});}catch(e){}
  pluginConnected=false;sessionId=null;updatePluginUI();updateInputState();
}

function updateCreditUI(){
  const pill=document.getElementById('credit-pill');
  const text=document.getElementById('credit-pill-text');
  const bal=typeof credits.balance==='number'?credits.balance:parseFloat(credits.balance)||0;
  text.textContent=bal.toFixed(2);
  if(bal<=2){pill.classList.remove('ok');pill.classList.add('low');}
  else{pill.classList.remove('low');pill.classList.add('ok');}
  const hint=document.getElementById('token-cost-hint');
  hint.textContent=bal<=0?'No credits':bal.toFixed(2)+' credits';
}

async function openConnectModal(){
  document.getElementById('connect-modal-overlay').classList.add('open');
  await generateCode();startConnectPoll();
}
function closeConnectModal(){
  document.getElementById('connect-modal-overlay').classList.remove('open');
  if(connectPoll){clearInterval(connectPoll);connectPoll=null;}
}

async function generateCode(){
  const r=await api('/connect/code');
  if(!r)return;
  sessionId=r.data.session_id;
  document.getElementById('cm-code').textContent=r.data.code;
  try{const u=await api('/auth/me');if(u&&u.data&&u.data.user&&u.data.user.roblox_id)document.getElementById('cm-tip').textContent='Roblox ID detected — may auto-connect.';else document.getElementById('cm-tip').textContent='Add your Roblox ID for auto-connect.';}catch(e){document.getElementById('cm-tip').textContent='';}
}

document.getElementById('cm-copy-btn').addEventListener('click',()=>{
  navigator.clipboard.writeText(document.getElementById('cm-code').textContent);
  const b=document.getElementById('cm-copy-btn');b.textContent='Copied';setTimeout(()=>b.textContent='Copy',1200);
});
document.getElementById('cm-refresh-btn').addEventListener('click',()=>generateCode());

function startConnectPoll(){
  if(connectPoll)clearInterval(connectPoll);
  connectPoll=setInterval(async()=>{
    try{const r=await fetch('/status');if(!r.ok)return;const d=await r.json();
    if(d.plugin_connected){clearInterval(connectPoll);connectPoll=null;pluginConnected=true;updatePluginUI();closeConnectModal();updateInputState();}}catch(e){}
  },2000);
}

function updatePluginUI(){
  const dot=document.getElementById('plugin-dot'),txt=document.getElementById('plugin-text'),lbl=document.getElementById('sb-connect-label');
  const discBtn=document.getElementById('sb-disconnect-btn');
  dot.classList.toggle('on',pluginConnected);txt.classList.toggle('on',pluginConnected);
  txt.textContent=pluginConnected?'Studio connected':'Disconnected';
  if(lbl)lbl.textContent=pluginConnected?'Connected':'Connect Studio';
  discBtn.style.display=pluginConnected?'flex':'none';
}

function enterChat(){
  document.body.classList.add('ready');
  document.getElementById('sb-new-btn').disabled=false;
  updateInputState();startStatusPoll();
}

function startStatusPoll(){
  if(statusPoll)clearInterval(statusPoll);
  statusPoll=setInterval(async()=>{
    try{const r=await fetch('/status');if(!r.ok)return;const d=await r.json();
    const wasConnected=pluginConnected;
    pluginConnected=d.plugin_connected;
    updatePluginUI();
    if(wasConnected&&!pluginConnected)updateInputState();
    }catch(e){}
  },5000);
}

function updateInputState(){
  const ia=document.getElementById('input-area'),nc=document.getElementById('no-credits'),pill=document.getElementById('credit-pill');
  const bal=typeof credits.balance==='number'?credits.balance:parseFloat(credits.balance)||0;
  if(bal<=0){
    ia.style.display='none';nc.style.display='';
    const at=credits.next_credit_at;if(at>0){const d=at-Date.now();if(d>0){const h=Math.floor(d/36e5),m=Math.floor((d%36e5)/6e4);document.getElementById('no-credits-time').textContent='Next credit in '+h+'h '+m+'m';}else document.getElementById('no-credits-time').textContent='Refreshing...';}
    pill.style.display='none';return;
  }
  nc.style.display='none';ia.style.display='';pill.style.display='flex';
  document.getElementById('send-btn').disabled=false;
  document.getElementById('chat-input').placeholder=!pluginConnected?'Send a message — connect Studio first':(mode==='agent'?'Describe a multi-step task...':'Ask about your Roblox game...');
}

function setViewMode(chatting){
  inConversation=chatting;
  document.getElementById('dashboard').classList.toggle('hidden',chatting);
  document.getElementById('messages').classList.toggle('show',chatting);
}

function togglePicker(which){
  const other=which==='model'?'mode':'model';
  document.getElementById(other+'-picker').classList.remove('open');
  const mp=document.getElementById(which+'-picker');
  if(openPicker===which){mp.classList.remove('open');openPicker=null;return;}
  mp.classList.add('open');openPicker=which;
}
function selectModel(k){selectedModel=k;updateModelUI();document.getElementById('model-picker').classList.remove('open');openPicker=null;}
function selectMode(m){mode=m;updateModeUI();document.getElementById('mode-picker').classList.remove('open');openPicker=null;updateInputState();}
function updateModelUI(){document.getElementById('model-label').textContent=(MODEL_LABELS[selectedModel]||'Sonnet').replace('Claude ','');document.querySelectorAll('#model-picker .picker-option').forEach(o=>o.classList.toggle('selected',o.dataset.key===selectedModel));}
function updateModeUI(){document.getElementById('mode-label').textContent=MODE_LABELS[mode]||'Chat';document.querySelectorAll('#mode-picker .picker-option').forEach(o=>o.classList.toggle('selected',o.dataset.mode===mode));}
document.addEventListener('click',e=>{if(!e.target.closest('.picker-trigger')&&!e.target.closest('.picker-dropdown')){document.getElementById('model-picker').classList.remove('open');document.getElementById('mode-picker').classList.remove('open');openPicker=null;}});

/* ═══ CONVERSATION PERSISTENCE ═══ */
async function loadConversations(){
  try{const r=await api('/api/conversations');if(!r)return;convCache=r.data||{};renderSidebar();}catch(e){convCache={};renderSidebar();}
}

async function saveConv(){
  if(!currentMessages.length)return;
  const first=currentMessages.find(m=>m.role==='user');
  const title=first?first.text.slice(0,48):'Conversation';
  const cid=activeConvId||'conv-'+Date.now();
  activeConvId=cid;
  const convData={id:cid,title,messages:currentMessages,history:conversationHistory,mode,model:selectedModel,sessionId,updatedAt:Date.now()};
  try{await api('/api/conversations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(convData)});convCache[cid]=convData;renderSidebar();}catch(e){}
}

async function deleteConv(id){
  try{await api('/api/conversations/'+id,{method:'DELETE'});}catch(e){}
  delete convCache[id];
  if(activeConvId===id){activeConvId=null;showDashboard();}
  renderSidebar();
}

function getConvList(){return Object.values(convCache).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderSidebar(){
  const list=document.getElementById('sb-conv-list'),empty=document.getElementById('sb-empty');
  list.querySelectorAll('.sb-item').forEach(e=>e.remove());
  const convs=getConvList();
  if(!convs.length){empty.style.display='';return;}
  empty.style.display='none';
  convs.forEach(c=>{
    const item=document.createElement('div');item.classList.add('sb-item');
    if(c.id===activeConvId)item.classList.add('active');
    item.innerHTML=`<div class="sb-item-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div><div class="sb-item-text">${escHtml(c.title)}</div><button class="sb-item-del" title="Delete">&times;</button>`;
    item.querySelector('.sb-item-del').addEventListener('click',e=>{e.stopPropagation();deleteConv(c.id)});
    item.addEventListener('click',e=>{if(e.target.closest('.sb-item-del'))return;openConv(c.id)});
    list.appendChild(item);
  });
}

async function openConv(id){
  let c=convCache[id];
  if(!c){try{const r=await api('/api/conversations/'+id);if(r&&r.ok)c=r.data;}catch(e){}}
  if(!c)return;
  activeConvId=id;sessionId=c.sessionId||sessionId;
  conversationHistory=c.history||[];currentMessages=c.messages||[];
  pendingSessionId=c.pendingSessionId||null;
  mode=c.mode||'chat';selectedModel=c.model||'sonnet';
  updateModelUI();updateModeUI();
  document.getElementById('plan-banner').classList.remove('show');
  const msgs=document.getElementById('messages');msgs.innerHTML='';
  currentMessages.forEach(m=>renderMessage(m));msgs.scrollTop=msgs.scrollHeight;
  setViewMode(true);renderSidebar();
}

function showDashboard(){activeConvId=null;document.getElementById('messages').innerHTML='';setViewMode(false);renderSidebar();}

function startNewConv(){
  activeConvId='new-'+Date.now();sessionId=sessionId||crypto.randomUUID();
  conversationHistory=[];currentMessages=[];pendingSessionId=null;
  mode='chat';updateModeUI();
  document.getElementById('messages').innerHTML='';
  document.getElementById('plan-banner').classList.remove('show');
  setViewMode(true);renderSidebar();document.getElementById('chat-input').focus();
}
document.getElementById('sb-new-btn').addEventListener('click',startNewConv);

const chatInput=document.getElementById('chat-input');
chatInput.addEventListener('input',()=>{chatInput.style.height='auto';chatInput.style.height=Math.min(chatInput.scrollHeight,200)+'px';});
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

const userSVG=`<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`;
const botSVG=`<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;
const toolSVG=`<svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>`;

function renderMessage(m){
  const msgs=document.getElementById('messages');
  if(m.role==='system'){const r=document.createElement('div');r.classList.add('msg-row','system-row');const s=document.createElement('div');s.classList.add('system-msg');s.textContent=m.text;r.appendChild(s);msgs.appendChild(r);return;}
  if(m.isToolEvent){const r=document.createElement('div');r.classList.add('msg-row','assistant');const a=document.createElement('div');a.classList.add('msg-avatar');a.innerHTML=botSVG;const b=document.createElement('div');b.classList.add('msg-body');const c=document.createElement('div');c.classList.add('tool-card');c.innerHTML=`<div class="tool-card-icon">${toolSVG}</div><div class="tool-card-name">${escHtml(m.toolName||'')}</div><div class="tool-card-args">${escHtml(m.toolArgs||'')}</div>`;b.appendChild(c);r.appendChild(a);r.appendChild(b);msgs.appendChild(r);msgs.scrollTop=msgs.scrollHeight;return;}
  const r=document.createElement('div');r.classList.add('msg-row',m.role);
  const a=document.createElement('div');a.classList.add('msg-avatar');a.innerHTML=m.role==='user'?userSVG:botSVG;
  const b=document.createElement('div');b.classList.add('msg-body');
  const sn=document.createElement('div');sn.classList.add('msg-sender');sn.textContent=m.role==='user'?'You':'Rux';
  const bl=document.createElement('div');bl.classList.add('msg-bubble');bl.textContent=m.text;
  b.appendChild(sn);b.appendChild(bl);r.appendChild(a);r.appendChild(b);msgs.appendChild(r);msgs.scrollTop=msgs.scrollHeight;
}

function pushMsg(m){currentMessages.push(m);renderMessage(m);}
function addTyping(){const msgs=document.getElementById('messages');const r=document.createElement('div');r.classList.add('msg-row','assistant');r.id='typing-row';const a=document.createElement('div');a.classList.add('msg-avatar');a.innerHTML=botSVG;const b=document.createElement('div');b.classList.add('msg-body');const t=document.createElement('div');t.classList.add('typing-indicator');t.innerHTML='<span></span><span></span><span></span>';b.appendChild(t);r.appendChild(a);r.appendChild(b);msgs.appendChild(r);msgs.scrollTop=msgs.scrollHeight;}
function removeTyping(){const e=document.getElementById('typing-row');if(e)e.remove();}

function showPlan(p){document.getElementById('plan-text').textContent=p;document.getElementById('plan-banner').classList.add('show');}
function hidePlan(){document.getElementById('plan-banner').classList.remove('show');}
document.getElementById('reject-plan-btn').addEventListener('click',()=>{hidePlan();pendingSessionId=null;pushMsg({role:'system',text:'Plan discarded.'});});
document.getElementById('approve-btn').addEventListener('click',async()=>{
  hidePlan();if(!pendingSessionId)return;
  pushMsg({role:'system',text:'Executing plan...'});addTyping();
  try{const r=await api('/ai/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:pendingSessionId,model:selectedModel})});
  if(!r){removeTyping();pushMsg({role:'assistant',text:'Failed to start agent.'});return;}
  removeTyping();handleResponse(r.data);if(r.data.status==='tool_requested')await pollForResult(pendingSessionId);}
  catch(e){removeTyping();pushMsg({role:'assistant',text:'Error: '+e.message});}
});

function handleResponse(d){
  if(d.session_id)pendingSessionId=d.session_id;
  if(d.credits!=null){credits.balance=d.credits;updateCreditUI();updateInputState();}
  if(d.error==='no_credits'){credits.balance=0;credits.next_credit_at=d.next_credit_at;updateCreditUI();updateInputState();pushMsg({role:'system',text:'No credits remaining.'});return;}
  if(d.plan&&d.status==='awaiting_approval'){showPlan(d.plan);pushMsg({role:'assistant',text:'Plan ready. Review above.'});saveConv();return;}
  if(d.tool_calls&&d.tool_calls.length){d.tool_calls.forEach(tc=>{lastShownToolId=tc.id;pushMsg({role:'assistant',text:'',isToolEvent:true,toolName:tc.name,toolArgs:JSON.stringify(tc.arguments).slice(0,100)});});}
  if(d.reply&&d.status==='done'){pushMsg({role:'assistant',text:d.reply});conversationHistory.push({role:'assistant',content:d.reply});saveConv();}
  if(d.tokens_used){pushMsg({role:'system',text:d.tokens_used+' tokens used'});}
}

async function pollForResult(sid){
  addTyping();
  for(let i=0;i<90;i++){
    await new Promise(r=>setTimeout(r,2000));
    try{const r=await api('/ai/result/'+sid);if(!r)break;const d=r.data;
      if(d.credits!=null){credits.balance=d.credits;updateCreditUI();updateInputState();}
      if(d.pending_tool_call&&d.pending_tool_call.id!==lastShownToolId){removeTyping();lastShownToolId=d.pending_tool_call.id;pushMsg({role:'assistant',text:'',isToolEvent:true,toolName:d.pending_tool_call.name,toolArgs:JSON.stringify(d.pending_tool_call.arguments).slice(0,100)});addTyping();}
      if(d.status==='done'){removeTyping();lastShownToolId=null;if(d.reply){pushMsg({role:'assistant',text:d.reply});conversationHistory.push({role:'assistant',content:d.reply});}saveConv();return;}
      if(d.status==='error'){removeTyping();lastShownToolId=null;pushMsg({role:'assistant',text:'Execution failed. Check Studio connection.'});saveConv();return;}
    }catch(e){break;}
  }
  removeTyping();lastShownToolId=null;pushMsg({role:'system',text:'Timed out waiting for Studio.'});saveConv();
}

async function sendMessage(){
  const text=chatInput.value.trim();if(!text||isLoading)return;
  const bal=typeof credits.balance==='number'?credits.balance:parseFloat(credits.balance)||0;
  if(bal<=0){updateInputState();return;}
  if(!pluginConnected){openConnectModal();return;}
  if(!activeConvId)startNewConv();
  isLoading=true;chatInput.value='';chatInput.style.height='auto';
  document.getElementById('send-btn').disabled=true;
  conversationHistory.push({role:'user',content:text});pushMsg({role:'user',text});addTyping();
  try{const r=await api('/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,mode,message:text,model:selectedModel,conversation_history:conversationHistory.slice(-20)})});
  removeTyping();if(!r){pushMsg({role:'assistant',text:'Connection error.'});return;}
  handleResponse(r.data);if(r.data.status==='tool_requested')await pollForResult(r.data.session_id||sessionId);}
  catch(e){removeTyping();pushMsg({role:'assistant',text:'Error: '+e.message});}
  finally{isLoading=false;document.getElementById('send-btn').disabled=false;}
}

(async function(){
  const t=getToken();
  if(t){token=t;const r=await api('/auth/me');if(r&&r.ok){userData=r.data.user;credits=r.data.credits;sessionId=r.data.session_id;updateCreditUI();if(sessionId)pluginConnected=true;updatePluginUI();enterChat();return;}}
  window.location.href='/';
})();
</script>
